name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary_ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary_ext: ".exe"

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          package="rusty-gitwiki-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${package}" artifacts
          cp "target/${{ matrix.target }}/release/rusty-gitwiki${{ matrix.binary_ext }}" "dist/${package}/"
          cp -R static "dist/${package}/static"
          cp README.md LICENSE "dist/${package}/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a "../artifacts/${package}.zip" "${package}" >/dev/null)
          else
            tar -C dist -czf "artifacts/${package}.tar.gz" "${package}"
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: rusty-gitwiki-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"
